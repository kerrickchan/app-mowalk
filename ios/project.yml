name: MoWalk
options:
  bundleIdPrefix: com.mowalk
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"

targets:
  MoWalk:
    type: application
    platform: iOS
    sources:
      - path: MoWalk
    settings:
      base:
        INFOPLIST_FILE: MoWalk/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.mowalk.app
        PRODUCT_NAME: MoWalk
        GENERATE_INFOPLIST_FILE: "YES"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        DEVELOPMENT_TEAM: ""
    info:
      path: MoWalk/Resources/Info.plist
      properties:
        CFBundleDisplayName: MoWalk
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSHealthShareUsageDescription: "MoWalk reads your step data from Health to show comprehensive step history."
        NSHealthUpdateUsageDescription: "MoWalk writes your step data to Health so other apps can access it."
        NSMotionUsageDescription: "MoWalk uses motion sensors to count your steps throughout the day."
        UIBackgroundModes:
          - fetch
          - processing
        UIRequiredDeviceCapabilities:
          - arm64

  MoWalkTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MoWalkTests
    dependencies:
      - target: MoWalk
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.mowalk.app.tests
        PRODUCT_NAME: MoWalkTests
